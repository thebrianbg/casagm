<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <!-- PWA / iOS meta -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Casa GM" />
  <meta name="theme-color" content="#1a2e5a" />
  <meta name="description" content="Home, managed." />

  <title>Casa GM</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

<!-- ── Lock Screen ── -->
<div id="lock-screen" class="lock-screen">
  <div class="lock-inner">
    <div class="lock-logo">
      <svg width="72" height="72" viewBox="0 0 512 512" style="border-radius:18px">
        <rect width="512" height="512" fill="#1a2e5a"/>
        <path d="M256,118 L412,258 L412,412 L100,412 L100,258 Z" fill="#d4a843"/>
        <path d="M216,412 L216,340 Q216,306 256,306 Q296,306 296,340 L296,412 Z" fill="#1a2e5a"/>
        <text x="256" y="300" text-anchor="middle" fill="#1a2e5a"
              font-family="-apple-system,BlinkMacSystemFont,sans-serif"
              font-weight="900" font-size="80" letter-spacing="-3">GM</text>
      </svg>
    </div>
    <div class="lock-name">Casa GM</div>
    <div class="lock-tagline">Home, managed.</div>

    <!-- Face ID unlock (shown when registered) -->
    <div id="lock-fid" class="hidden" style="width:100%;margin-bottom:20px">
      <button id="fid-btn" class="lock-fid-btn" onclick="Auth.unlockWithFaceId()">
        🔐&nbsp; Use Face ID
      </button>
      <div class="lock-divider"><span>or sign in with email</span></div>
    </div>

    <div id="auth-form" class="auth-form">
      <!-- Step 1: email -->
      <div id="auth-step-email">
        <input type="email" id="auth-email" class="fi lock-input"
               placeholder="your@email.com"
               onkeydown="if(event.key==='Enter') Auth.sendCode()" />
        <button id="auth-btn" class="btn-save lock-btn" onclick="Auth.sendCode()">
          Send Code
        </button>
        <div class="auth-hint">We'll email you an 8-digit code.<br>No password needed.</div>
      </div>

      <!-- Step 2: code entry -->
      <div id="auth-step-code" class="hidden">
        <div class="auth-code-label">Enter the 8-digit code sent to<br><strong id="auth-email-display"></strong></div>
        <input type="number" id="auth-code" class="fi lock-input lock-input-code"
               placeholder="00000000" maxlength="8"
               onkeydown="if(event.key==='Enter') Auth.verifyCode()" />
        <button class="btn-save lock-btn" onclick="Auth.verifyCode()">Verify</button>
        <button onclick="Auth.resetForm()" class="auth-back">← Use a different email</button>
      </div>

      <div id="auth-error" class="auth-error hidden"></div>
    </div>
  </div>
</div>

<!-- ── App ── -->
<div id="app" class="hidden">

  <!-- Main Content -->
  <main id="main-content">
    <section class="section active" id="section-home"></section>
    <section class="section" id="section-docs"></section>
    <section class="section" id="section-calendar"></section>
    <section class="section" id="section-reminders"></section>
    <section class="section" id="section-more"></section>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-s="home">
      <svg viewBox="0 0 24 24">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/>
        <path d="M9 21V12h6v9"/>
      </svg>
      <span>Home</span>
    </button>
    <button class="nav-item" data-s="calendar">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>Calendar</span>
    </button>
    <button class="nav-item" data-s="reminders">
      <svg viewBox="0 0 24 24">
        <path d="M9 11l3 3L22 4"/>
        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
      </svg>
      <span>Reminders</span>
    </button>
    <button class="nav-item" data-s="docs">
      <svg viewBox="0 0 24 24">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
      <span>Docs</span>
    </button>
  </nav>

  <!-- Modal / Bottom Sheet -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="bottom-sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <span id="sheet-title" class="sheet-title"></span>
        <button class="sheet-close" onclick="Modal.hide()">✕</button>
      </div>
      <div id="sheet-body" class="sheet-body"></div>
    </div>
  </div>

</div>

<!-- Supabase, then config, auth, app (order matters) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
